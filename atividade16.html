<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atvc 16</title>
</head>
<body>
    <h1>A soma dos dois números</h1>
    <p>Digite os números para calcular:</p>

    <input type="number" name="" id="num1"  placeholder="Digite o numero">
    <input type="number" name="" id="num2"  placeholder="Digite o numero">

    <button onclick="somar()">somar</button>
    
    <p id="resultado"></p>

    <script>
        function somar(){
            let num1 = Number(document.getElementById("num1").value);
            let num2 = Number(document.getElementById("num2").value); 

            let total = num1 + num2;

            document.getElementById("resultado").innerHTML = "O resultado é: "+total;


        }
    </script>




</body>
</html>
